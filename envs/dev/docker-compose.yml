x-backend: &backend
  build:
    context: ./
    dockerfile: app/envs/prod/Dockerfile
  image: project/app
  init: true
  env_file: ./.env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment: &backend-env
    DATABASE_URL: postgres://postgres:12345@db:5432/project
    POSTGRES_HOST: db
    POSTGRES_PORT: "5432"
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    MEDIA_ROOT: ${MEDIA_ROOT:-/root/src/media}
    CELERY_BROKER_URL: redis://redis:6379/0
    PYLON_URL: http://pylon:8000
  volumes:
    - ./app/src:/root/src
    - app-venv:/root/src/.venv
    - ./app/envs/prod/entrypoint.sh:/root/src/entrypoint.sh
    - ./app/envs/prod/gunicorn.conf.py:/root/src/gunicorn.conf.py
    - ./app/envs/prod/celery-entrypoint.sh:/root/src/celery-entrypoint.sh
    - ./app/envs/prod/prometheus-cleanup.sh:/root/src/prometheus-cleanup.sh
    - ./app/envs/prod/block-scheduler-entrypoint.sh:/root/src/block-scheduler-entrypoint.sh
    - ${MEDIA_VOLUME_PATH:-./app/src/media}:/root/src/media

services:
  app:
    <<: *backend
    command: >
      sh -c "./prometheus-cleanup.sh &&
             PROMETHEUS_EXPORT_MIGRATIONS=0 ./manage.py wait_for_database --timeout 10 &&
             PROMETHEUS_EXPORT_MIGRATIONS=0 ./manage.py migrate &&
             gunicorn -b 0.0.0.0:8000 project.wsgi:application"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - ${APP_PORT:-8000}:8000

  redis:
    image: mirror.gcr.io/valkey/valkey:8.1-alpine
    command: valkey-server --appendonly yes
    healthcheck:
      test: valkey-cli ping
    volumes:
      - ./redis/data:/data
    ports:
      - ${REDIS_PORT}:6379

  db:
    image: mirror.gcr.io/postgres:14.0-alpine
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} || exit 1
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_PATH:-./db/data}:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:5432

  prometheus:
    image: prom/prometheus:v2.47.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    ports:
      - ${PROMETHEUS_PORT:-9090}:9090
    depends_on:
      - app

  grafana:
    image: grafana/grafana:10.2.0
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Sentinel Tower
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BLOCK_END=${BLOCK_END:-5000000}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - ${GRAFANA_PORT:-3001}:3000
    depends_on:
      - prometheus
      - db

  pylon:
    image: backenddevelopersltd/bittensor-pylon:latest
    platform: linux/amd64
    env_file: ./.env
    ports:
      - ${PYLON_PORT:-8090}:8000
    profiles:
      - async-scheduler

  flower:
    <<: *backend
    command: celery -A project flower --max-tasks=300
    environment:
      <<: *backend-env
    ports:
      - ${FLOWER_PORT:-5555}:5555
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - async-scheduler

  celery-worker:
    <<: *backend
    healthcheck:
      test: celery -A project status > /dev/null || exit 1
    environment:
      <<: *backend-env
      SENTINEL_MODE: ${SENTINEL_MODE:-live}
      PYLON_URL: http://pylon:8000
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    command: ./celery-entrypoint.sh
    tmpfs: /run
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - async-scheduler

  block-scheduler:
    <<: *backend
    restart: always
    command: python manage.py block_scheduler
    environment:
      <<: *backend-env
      SENTINEL_MODE: ${SENTINEL_MODE:-live}
      BLOCK_START: ${BLOCK_START:-}
      BLOCK_END: ${BLOCK_END:-}
      BACKFILL_RATE_LIMIT: ${BACKFILL_RATE_LIMIT:-1.0}
      NETUID: ${NETUID:-}
      BACKFILL_STEP: ${BACKFILL_STEP:-1}
    depends_on:
      celery-worker:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    profiles:
      - async-scheduler

  sync-extrinsics:
    <<: *backend
    restart: always
    command: python manage.py sync_extrinsics
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - extrinsics

  backfill-extrinsics:
    <<: *backend
    command: python manage.py backfill_extrinsics
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - extrinsics

  sync-metagraph:
    <<: *backend
    restart: always
    command: python manage.py sync_metagraph
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - metagraph

  backfill-metagraph:
    <<: *backend
    command: python manage.py backfill_metagraph
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - metagraph

volumes:
  app-venv:
  prometheus-data:
  grafana-data:
