upstream postgres_backend {
    server db:5432;
}

server {
    listen 5432 ssl;
    proxy_pass postgres_backend;

    ssl_certificate         /etc/db_access_certs/server.crt;
    ssl_certificate_key     /etc/db_access_certs/server.key;
    ssl_client_certificate  /etc/db_access_certs/ca.crt;
    ssl_verify_client       on;

    ssl_protocols           TLSv1.2 TLSv1.3;

    proxy_timeout           1h;
    proxy_connect_timeout   10s;

    access_log              /dev/stdout;
    error_log               /dev/stderr info;
}
