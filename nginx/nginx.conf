# Synced from ghcr.io/reef-technologies/nginx-rt:v1.2.2 default /etc/nginx/nginx.conf.
# Re-sync this file when bumping the nginx-rt image tag.
#
# The only addition vs. the image default is the top-level `stream { ... }` block
# at the bottom, which loads /etc/nginx/stream.d/*.conf (e.g. the mTLS-terminating
# postgres proxy on :5432).

user nginx;

# Set number of worker processes automatically based on number of CPU cores.
worker_processes auto;

# Enables the use of JIT for regular expressions to speed-up their processing.
pcre_jit on;

# Configures default error logger.
error_log /var/log/nginx/error.log notice;

# Set PID file
pid /var/run/nginx.pid;

# Load dynamic modules.
include /etc/nginx/modules.conf;

events {
    worker_connections 1024;
}

http {
    vhost_traffic_status_zone;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    client_max_body_size 100m;

    sendfile on;
    tcp_nopush on;

    ssl_prefer_server_ciphers on;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ecdh_curve            secp521r1:secp384r1:X25519;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    ssl_session_cache         shared:SSL:20m;
    ssl_session_timeout       10m;
    ssl_session_tickets       off;

    ssl_stapling              on;
    ssl_stapling_verify       on;

    # Cloudflare DNSes
    resolver 1.1.1.1 1.0.0.1 [2606:4700:4700::1111] [2606:4700:4700::1001];
    resolver_timeout 5s;

    # Specifies the main log format.
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for"';

    # Sets the path, format, and configuration for a buffered log write.
    access_log /var/log/nginx/access.log main;

    # Includes virtual hosts configs.
    include /etc/nginx/conf.d/*.conf;
}

# Stream context for raw TCP proxying (e.g. mTLS-terminated PostgreSQL on :5432).
stream {
    # Stream context requires log_format names (unlike http, where the default `combined`
    # format is implicit). Define one shared format here so every stream server can
    # reference it.
    log_format basic '$remote_addr [$time_local] $protocol $status '
                     '$bytes_sent $bytes_received $session_time';

    include /etc/nginx/stream.d/*.conf;
}
